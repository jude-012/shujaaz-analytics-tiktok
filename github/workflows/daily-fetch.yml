name: Daily YouTube Fetch

on:
  schedule:
    - cron: '0 3 * * *'   # 6am EAT (UTC+3) every day
  workflow_dispatch:        # also lets you trigger manually from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python fetch.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shujaaz_videos.json
          git diff-index --quiet HEAD || git commit -m "chore: daily YouTube data refresh $(date -u +%Y-%m-%d)"
          git push
