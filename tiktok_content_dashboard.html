<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shujaaz Kenya — TikTok Content Performance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--red:#CC1F1F;--dark:#1A1A1A;--mid:#666;--border:#E8E8E8;--bg:#F7F7F7;--white:#fff;--teal:#25f4ee;--black:#000}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--dark)}
.topbar{background:#000;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tl{display:flex;align-items:center;gap:8px}
.tiktok-logo{font-size:16px;font-weight:900;letter-spacing:-.5px}
.t1{color:#fe2c55}.t2{color:#25f4ee}.t3{color:#fff}
.page-sub{font-size:12px;color:#888}
.nav-pills{display:flex;gap:6px}
.nav-pill{padding:4px 12px;border-radius:20px;border:1px solid #333;color:#aaa;font-size:11px;cursor:pointer;transition:all .15s;background:transparent}
.nav-pill.active{background:var(--teal);border-color:var(--teal);color:#000;font-weight:600}
.main{max-width:1300px;margin:0 auto;padding:24px}

/* Viral highlight */
.viral-card{background:linear-gradient(135deg,#1a1a1a 0%,#2d1515 100%);border-radius:12px;padding:20px 24px;margin-bottom:20px;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center}
.viral-tag{display:inline-block;background:var(--red);color:#fff;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:3px;margin-bottom:8px}
.viral-title{font-size:14px;color:#fff;line-height:1.5;margin-bottom:8px}
.viral-tags-row{display:flex;gap:6px;flex-wrap:wrap}
.htag{background:rgba(37,244,238,.15);color:var(--teal);font-size:10px;padding:2px 7px;border-radius:3px;border:1px solid rgba(37,244,238,.3)}
.viral-stats{display:flex;gap:20px}
.vs{text-align:center}
.vs-val{font-size:22px;font-weight:700;color:#fff}
.vs-label{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.06em}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.mc{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.mc.accent{border-top:3px solid var(--teal)}
.mc.red{border-top:3px solid var(--red)}
.ml{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.mv{font-size:20px;font-weight:700;color:var(--dark)}
.ms{font-size:10px;color:#bbb;margin-top:2px}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:18px}
.ct{font-size:13px;font-weight:600;color:var(--dark);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.ct small{font-size:10px;font-weight:400;color:#aaa}

/* Video table */
.vtable{width:100%;border-collapse:collapse;font-size:12px}
.vtable th{text-align:left;color:#aaa;font-weight:500;padding:8px 10px;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.vtable td{padding:10px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.vtable tr:last-child td{border-bottom:none}
.vtable tbody tr:hover td{background:#fafafa}
.vtitle-link{color:#1a73e8;text-decoration:none;font-size:12px;font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4;max-width:280px}
.vtitle-link:hover{text-decoration:underline}
.bar-bg{background:#f0f0f0;border-radius:2px;height:5px;margin-top:3px;min-width:80px}
.bar-fill{height:5px;border-radius:2px}
.rank-badge{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.share-bar{background:#e0fffe;border-radius:2px;height:5px;margin-top:3px}
.share-fill{height:5px;border-radius:2px;background:var(--teal)}
.htag-small{display:inline-block;background:#f0f0f0;color:#666;font-size:9px;padding:1px 5px;border-radius:2px;margin:1px}
.insight-box{background:#f8f9fa;border-radius:8px;padding:14px 16px;border-left:3px solid var(--teal)}
.insight-title{font-size:11px;font-weight:600;color:var(--dark);margin-bottom:4px}
.insight-text{font-size:11px;color:var(--mid);line-height:1.6}
@media(max-width:900px){.metrics{grid-template-columns:repeat(2,1fr)}.row2{grid-template-columns:1fr}.viral-card{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="topbar">
  <div class="tl">
    <div class="tiktok-logo"><span class="t1">Tik</span><span class="t2">Tok</span></div>
    <div style="width:1px;height:16px;background:#333;margin:0 8px"></div>
    <span class="page-sub">@shujaazkenya — Content Performance</span>
  </div>
  <div class="nav-pills">
    <span class="nav-pill active" onclick="sortBy('views',this)">Top Views</span>
    <span class="nav-pill" onclick="sortBy('shares',this)">Top Shares</span>
    <span class="nav-pill" onclick="sortBy('share_rate',this)">Share Rate</span>
    <span class="nav-pill" onclick="sortBy('engagement_rate',this)">Engagement</span>
  </div>
</div>

<div class="main" id="app">
  <div style="text-align:center;padding:60px;color:#aaa">Loading...</div>
</div>

<script>
const fmt = n => n>=1e6?(n/1e6).toFixed(1)+'M':n>=1000?(n/1000).toFixed(1)+'k':Number(n).toLocaleString();
let DATA=[], currentSort='views';
const RANK_COLORS=['#f5a623','#aaa','#cd7f32','#CC1F1F','#CC1F1F','#666','#666','#666','#666','#666','#666','#666','#666','#666'];

async function loadData(){
  const r = await fetch('tiktok_content.json?_='+Date.now());
  DATA = await r.json();
  render();
}

function sortBy(field, el){
  currentSort = field;
  document.querySelectorAll('.nav-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

function render(){
  const totalViews   = DATA.reduce((s,v)=>s+v.views,0);
  const totalLikes   = DATA.reduce((s,v)=>s+v.likes,0);
  const totalShares  = DATA.reduce((s,v)=>s+v.shares,0);
  const totalComments= DATA.reduce((s,v)=>s+v.comments,0);
  const avgEng       = ((totalLikes+totalShares+totalComments)/totalViews*100).toFixed(2);
  const avgShare     = (totalShares/totalViews*100).toFixed(2);
  const top          = [...DATA].sort((a,b)=>b.views-a.views)[0];

  document.getElementById('app').innerHTML = `
  <div class="viral-card">
    <div>
      <div class="viral-tag">Top performing video</div>
      <div class="viral-title">${top.title.slice(0,120)}${top.title.length>120?'...':''}</div>
      <div class="viral-tags-row">
        ${top.hashtags.map(h=>`<span class="htag">${h}</span>`).join('')}
        <span style="font-size:10px;color:#555;align-self:center;margin-left:4px">Posted ${top.post_time}</span>
      </div>
    </div>
    <div class="viral-stats">
      <div class="vs"><div class="vs-val">${fmt(top.views)}</div><div class="vs-label">Views</div></div>
      <div class="vs"><div class="vs-val" style="color:var(--teal)">${fmt(top.shares)}</div><div class="vs-label">Shares</div></div>
      <div class="vs"><div class="vs-val" style="color:#f5a623">${top.share_rate}%</div><div class="vs-label">Share rate</div></div>
    </div>
  </div>

  <div class="metrics">
    <div class="mc red"><div class="ml">Total views</div><div class="mv">${fmt(totalViews)}</div><div class="ms">across ${DATA.length} tracked videos</div></div>
    <div class="mc"><div class="ml">Total likes</div><div class="mv">${fmt(totalLikes)}</div><div class="ms">${(totalLikes/totalViews*100).toFixed(1)}% like rate</div></div>
    <div class="mc accent"><div class="ml">Total shares</div><div class="mv">${fmt(totalShares)}</div><div class="ms">${avgShare}% avg share rate</div></div>
    <div class="mc"><div class="ml">Comments</div><div class="mv">${fmt(totalComments)}</div><div class="ms">${(totalComments/totalViews*100).toFixed(2)}% comment rate</div></div>
    <div class="mc"><div class="ml">Avg engagement</div><div class="mv">${avgEng}%</div><div class="ms">likes+shares+comments/views</div></div>
  </div>

  <div class="row2">
    <div class="card">
      <div class="ct">Views vs shares per video <small>each bar = one video</small></div>
      <div style="position:relative;height:220px"><canvas id="vsChart"></canvas></div>
    </div>
    <div class="card">
      <div class="ct">Share rate by video</div>
      <div style="position:relative;height:220px"><canvas id="shareRateChart"></canvas></div>
    </div>
  </div>

  <div class="card" style="margin-bottom:14px">
    <div class="ct">All tracked videos <small>sorted by ${currentSort.replace('_',' ')}</small></div>
    <table class="vtable">
      <thead><tr>
        <th>#</th><th style="width:32%">Video</th><th>Posted</th>
        <th>Views</th><th>Shares</th><th>Share %</th><th>Likes</th><th>Comments</th><th>Eng %</th>
      </tr></thead>
      <tbody id="videoTbody"></tbody>
    </table>
  </div>

  <div class="row2">
    <div class="insight-box">
      <div class="insight-title">Silent engagement pattern confirmed</div>
      <div class="insight-text">The top video (March 25) has a 6.12% share rate — 12× the platform average of ~0.5%. Shares vastly outperform comments across all videos. This is consistent with the audience sharing sensitive social content privately rather than commenting publicly. The content is resonating deeply — it's just quiet engagement.</div>
    </div>
    <div class="insight-box" style="border-left-color:var(--red)">
      <div class="insight-title">Gender norms content dominates</div>
      <div class="insight-text">All top videos centre on gender roles, relationships and social norms (provider roles, "bad boys", house chores, dating rules). These themes consistently outperform in both views and shares. The #ShujaazKonnect and #ShujaazTok hashtags appear on all high performers — they act as algorithmic anchors for this content category.</div>
    </div>
  </div>`;

  renderVsChart();
  renderShareRateChart();
  renderTable();
}

function renderTable(){
  const sorted = [...DATA].sort((a,b)=>b[currentSort]-a[currentSort]);
  const maxViews = Math.max(...sorted.map(v=>v.views));
  const maxShares = Math.max(...sorted.map(v=>v.shares));
  document.getElementById('videoTbody').innerHTML = sorted.map((v,i)=>`
    <tr>
      <td><div class="rank-badge" style="background:${RANK_COLORS[i]||'#ddd'}">${i+1}</div></td>
      <td>
        <a class="vtitle-link" href="${v.url}" target="_blank" rel="noopener">${v.title}</a>
        <div style="margin-top:4px">${v.hashtags.slice(0,4).map(h=>`<span class="htag-small">${h}</span>`).join('')}</div>
      </td>
      <td style="color:#aaa;white-space:nowrap;font-size:11px">${v.post_time}</td>
      <td>
        <div style="font-weight:700">${fmt(v.views)}</div>
        <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(v.views/maxViews*100)}%;background:var(--red)"></div></div>
      </td>
      <td>
        <div style="font-weight:700;color:${v.shares>1000?'var(--teal)':''}">${fmt(v.shares)}</div>
        <div class="share-bar"><div class="share-fill" style="width:${Math.round(v.shares/maxShares*100)}%"></div></div>
      </td>
      <td style="font-weight:${v.share_rate>1?'700':'400'};color:${v.share_rate>2?'var(--teal)':v.share_rate>0.5?'var(--dark)':'#aaa'}">${v.share_rate}%</td>
      <td>${fmt(v.likes)}</td>
      <td>${fmt(v.comments)}</td>
      <td style="color:${v.engagement_rate>5?'var(--red)':'var(--dark)'}">${v.engagement_rate}%</td>
    </tr>`).join('');
}

function renderVsChart(){
  const sorted = [...DATA].sort((a,b)=>b.views-a.views);
  const labels = sorted.map((_,i)=>`#${i+1}`);
  new Chart(document.getElementById('vsChart'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'Views',data:sorted.map(v=>v.views),backgroundColor:'rgba(204,31,31,.7)',borderRadius:3,yAxisID:'y'},
      {label:'Shares',data:sorted.map(v=>v.shares),backgroundColor:'rgba(37,244,238,.8)',borderRadius:3,yAxisID:'y1'},
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10}}},
      scales:{x:{ticks:{font:{size:10}}},y:{position:'left',ticks:{callback:v=>fmt(v),font:{size:9}}},y1:{position:'right',grid:{drawOnChartArea:false},ticks:{callback:v=>fmt(v),font:{size:9}}}}}
  });
}

function renderShareRateChart(){
  const sorted = [...DATA].sort((a,b)=>b.share_rate-a.share_rate);
  new Chart(document.getElementById('shareRateChart'),{
    type:'bar',
    data:{
      labels:sorted.map(v=>v.title.slice(0,25)+'...'),
      datasets:[{data:sorted.map(v=>v.share_rate),backgroundColor:sorted.map(v=>v.share_rate>2?'var(--teal)':v.share_rate>0.5?'rgba(37,244,238,.5)':'rgba(37,244,238,.2)'),borderRadius:3}]
    },
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},
      scales:{x:{ticks:{callback:v=>v+'%',font:{size:9}}},y:{ticks:{font:{size:9}}}}}
  });
}

loadData().catch(e=>{
  document.getElementById('app').innerHTML=`<div style="text-align:center;padding:60px;color:#CC1F1F">
    Could not load tiktok_content.json<br><small>${e.message}</small><br><br>
    Run: <strong>python -m http.server 8000</strong> then open <strong>http://localhost:8000/tiktok_content_dashboard.html</strong>
  </div>`;
});
</script>
</body>
</html>
